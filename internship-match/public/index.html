<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校企实习岗位撮合平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .app-layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }
    #sidebar {
      width: 220px;
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      flex-shrink: 0;
    }
    .menu-item {
      padding: 10px 24px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: all 0.15s;
    }
    .menu-item:hover {
      background: #e8f0fe;
      color: var(--primary);
    }
    #main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a class="navbar-brand" href="#">校企实习岗位撮合平台</a>
  </nav>
  <div class="app-layout">
    <div id="sidebar"></div>
    <div id="main-content"></div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
