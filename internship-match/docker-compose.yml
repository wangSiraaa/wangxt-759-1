services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=internship-match-prod-secret
      - DB_PATH=/app/data/internship.db
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/auth/me"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
